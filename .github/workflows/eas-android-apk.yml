name: Build Android APK with EAS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android-apk:
    name: EAS Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: silk-beauty-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: silk-beauty-app/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: 20.1.0
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build signed internal APK
        run: eas build -p android --profile internal --non-interactive --wait
